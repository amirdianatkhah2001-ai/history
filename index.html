<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World History Timeline Explorer</title>
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#08111e;
  color:#c8d8ec;
  font-family:'Segoe UI',system-ui,sans-serif;
  user-select:none;
}
body { display:flex; flex-direction:column; }

/* ── TOP BAR ──────────────────────────────────────────────── */
#top-bar {
  flex-shrink:0;
  height:100px;
  background:#060d18;
  border-bottom:1px solid #162540;
  display:flex; flex-direction:column; align-items:center;
  cursor:grab; position:relative;
}
#top-bar.dragging { cursor:grabbing; }
#year-display {
  font-size:36px; font-weight:700; letter-spacing:4px;
  color:#f0c060; text-shadow:0 0 24px rgba(240,192,96,.45);
  padding-top:6px; pointer-events:none;
}
#drag-hint {
  font-size:9px; letter-spacing:2px; color:#243854;
  pointer-events:none; margin-top:1px;
}
#axis-svg { width:100%; flex:1; pointer-events:none; }

/* ── MIDDLE ZONE ──────────────────────────────────────────── */
#middle { flex:1; display:flex; overflow:hidden; min-height:0; }

/* ── SIDEBAR ──────────────────────────────────────────────── */
#sidebar {
  width:182px; flex-shrink:0;
  background:#060d18; border-right:1px solid #162540;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-title {
  padding:9px 12px; font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.5px;
  color:#2e5070; border-bottom:1px solid #162540; flex-shrink:0;
}
#civ-list { overflow-y:auto; flex:1; padding:3px 0; }
#civ-list::-webkit-scrollbar { width:3px; }
#civ-list::-webkit-scrollbar-thumb { background:#1e304a; border-radius:2px; }
.civ-item {
  display:flex; align-items:center; gap:8px;
  padding:6px 12px; cursor:pointer;
  transition:background .12s;
}
.civ-item:hover { background:#0c1e34; }
.civ-item.sel { background:#102840; }
.civ-item.dim { opacity:.28; }
.civ-swatch { width:11px; height:11px; border-radius:2px; flex-shrink:0; }
.civ-info { flex:1; min-width:0; }
.civ-name { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.civ-year { font-size:9px; color:#2e5070; }
.no-civs { padding:10px 12px; font-size:11px; color:#1e304a; }

/* ── MAP AREA ─────────────────────────────────────────────── */
#map-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ── CONTROLS BAR ─────────────────────────────────────────── */
#controls-bar {
  display:flex; align-items:center; flex-wrap:wrap;
  gap:5px; padding:5px 10px;
  background:#060d18; border-bottom:1px solid #162540;
  flex-shrink:0;
}
.cb { /* control button */
  background:#0c1e34; border:1px solid #1e3050;
  color:#90a8c0; padding:3px 9px; border-radius:4px;
  cursor:pointer; font-size:10px; transition:background .12s, border-color .12s;
  white-space:nowrap;
}
.cb:hover { background:#14283e; border-color:#2a4868; }
.cb.on { background:#193260; border-color:#3a6090; color:#7eb8f7; }
.sep { width:1px; height:18px; background:#162540; flex-shrink:0; }
#search-input {
  background:#0c1e34; border:1px solid #1e3050; color:#c8d8ec;
  padding:3px 10px; border-radius:4px; font-size:10px; width:145px;
  margin-left:auto; outline:none;
}
#search-input::placeholder { color:#1e3050; }
#search-input:focus { border-color:#3a6090; }

/* ── MAP SVG ──────────────────────────────────────────────── */
#map-wrap { flex:1; position:relative; overflow:hidden; }
#map-svg { position:absolute; inset:0; width:100%; height:100%; }

/* ── TOOLTIP ──────────────────────────────────────────────── */
#tooltip {
  position:fixed; z-index:200; pointer-events:none;
  background:rgba(4,10,22,.96); border:1px solid #1e3a60;
  border-radius:7px; padding:10px 13px; max-width:230px;
  opacity:0; transition:opacity .15s; backdrop-filter:blur(6px);
}
#tooltip.show { opacity:1; }
#tt-name { font-size:13px; font-weight:700; color:#f0c060; margin-bottom:3px; }
#tt-dates { font-size:10px; color:#3e6080; margin-bottom:6px; }
#tt-desc { font-size:10px; color:#90a8c0; line-height:1.55; }

/* ── BOTTOM PANEL ─────────────────────────────────────────── */
#bottom-panel {
  flex-shrink:0; height:160px;
  background:#060d18; border-top:1px solid #162540;
  position:relative; overflow:hidden;
}
#events-svg { position:absolute; inset:0; width:100%; height:100%; }

/* ── EVENT POPUP ──────────────────────────────────────────── */
#ev-popup {
  position:fixed; z-index:300; display:none;
  background:#04101e; border:1px solid #2a4a80;
  border-radius:9px; padding:14px 18px; max-width:310px;
  box-shadow:0 6px 32px rgba(0,0,0,.7); backdrop-filter:blur(8px);
}
#ev-popup-close {
  position:absolute; top:9px; right:13px;
  cursor:pointer; color:#2e5070; font-size:16px; line-height:1;
}
#ev-popup-close:hover { color:#c8d8ec; }
#ep-cat {
  display:inline-block; font-size:9px; font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  padding:2px 8px; border-radius:10px; margin-bottom:7px;
}
#ep-title { font-size:15px; font-weight:700; color:#f0c060; margin-bottom:4px; }
#ep-year { font-size:10px; color:#3e6080; margin-bottom:9px; }
#ep-desc { font-size:11px; color:#90a8c0; line-height:1.65; }
</style>
</head>

  </div>
</div>

<!-- BOTTOM EVENTS PANEL -->

</div>

<!-- TOOLTIP -->
<div id="tooltip">

  <div id="ep-title"></div>

  <div id="ep-desc"></div>
</div>

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let year        = 1500;
let selCivId    = null;
let playing     = false;
let speed       = 1;       // multiplier (1 | 5 | 20)
let activeCats  = new Set(Object.keys(CAT_COLOR));
let searchQ     = '';
let playTimer   = null;

const MIN_Y = -3500, MAX_Y = 2026;
const AXIS_WIN = 480;   // total years visible on top axis
const EV_WIN   = 120;   // ±120 years in events panel

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function fmtYear(y){
  return y < 0 ? `${-y} BC` : `${y} AD`;
}
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }

// ═══════════════════════════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════════════════════════
let proj, gpath, mapSvg, civLayer;

function initMap(){
  mapSvg = d3.select('#map-svg');
  mapSvg.selectAll('*').remove();

  const el   = document.getElementById('map-wrap');
  const W    = el.clientWidth  || 800;
  const H    = el.clientHeight || 500;
  const scl  = Math.min(W / 6.2, H / 3.2);

  proj  = d3.geoNaturalEarth1().scale(scl).translate([W/2, H/2]);
  gpath = d3.geoPath().projection(proj);

  // Ocean background
  mapSvg.append('rect').attr('width',W).attr('height',H).attr('fill','#0a1828');

  // Sphere
  mapSvg.append('path')
    .datum({type:'Sphere'}).attr('d',gpath)
    .attr('fill','#0d2444').attr('stroke','#162a44').attr('stroke-width',0.8);

  // Graticule
  mapSvg.append('path')
    .datum(d3.geoGraticule()())
    .attr('d',gpath).attr('fill','none')
    .attr('stroke','rgba(255,255,255,0.05)').attr('stroke-width',0.4);

  // Country base layer
  const countryLayer = mapSvg.append('g').attr('id','country-layer');
  // Civilization territory layer
  civLayer = mapSvg.append('g').attr('id','civ-layer');

  // Load world atlas
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(world=>{
      const countries = topojson.feature(world, world.objects.countries);
      countryLayer.selectAll('.country')
        .data(countries.features)
        .join('path')
        .attr('class','country')
        .attr('d', gpath)
        .attr('fill','#1a2e50')
        .attr('stroke','#0e1e38')
        .attr('stroke-width',0.35);
      renderCivs();
    })
    .catch(()=>{ renderCivs(); }); // render civs even if atlas fails
}

// ═══════════════════════════════════════════════════════════
//  CIVILIZATION RENDERING
// ═══════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');

function renderCivs(){
  if(!civLayer) return;
  civLayer.selectAll('.civ-path').remove();

  const active = CIVS.filter(c=> year >= c.start && year <= c.end);

  active.forEach(c=>{
    const dimmed = selCivId && selCivId !== c.id;
    const op     = dimmed ? 0.08 : 0.55;

    civLayer.append('path')
      .datum({type:'Feature', geometry:c.geo, properties:{}})
      .attr('class','civ-path')
      .attr('d', gpath)
      .attr('fill', c.color)
      .attr('fill-opacity', op)
      .attr('stroke', c.color)
      .attr('stroke-width', 1.1)
      .attr('stroke-opacity', op * 0.9)
      .style('cursor','pointer')
      .style('transition','fill-opacity 0.2s, stroke-opacity 0.2s')
      .on('mouseenter', function(ev){ showTip(ev, c); })
      .on('mousemove',  function(ev){ moveTip(ev); })
      .on('mouseleave', hideTip)
      .on('click', ()=> toggleCiv(c.id));
  });
}

function showTip(ev, c){
  document.getElementById('tt-name').textContent  = c.name;
  document.getElementById('tt-dates').textContent = `${fmtYear(c.start)} – ${fmtYear(c.end)}`;
  document.getElementById('tt-desc').textContent  = c.desc;
  tooltip.classList.add('show');
  moveTip(ev);
}
function moveTip(ev){
  let x = ev.clientX + 15, y = ev.clientY - 12;
  if(x + 240 > window.innerWidth) x = ev.clientX - 245;
  if(y + 120 > window.innerHeight) y = ev.clientY - 125;
  tooltip.style.left = x+'px';
  tooltip.style.top  = y+'px';
}
function hideTip(){ tooltip.classList.remove('show'); }

function toggleCiv(id){
  selCivId = selCivId === id ? null : id;
  renderCivs();
  renderSidebar();
}

// ═══════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════
function renderSidebar(){
  const list = document.getElementById('civ-list');
  const active = CIVS.filter(c=> year >= c.start && year <= c.end)
                     .sort((a,b)=> a.start - b.start);
  if(!active.length){
    list.innerHTML='<div class="no-civs">No active civilizations</div>';
    return;
  }
  list.innerHTML = active.map(c=>{
    const cls = selCivId === c.id ? ' sel' : (selCivId && selCivId !== c.id ? ' dim':'');
    return `<div class="civ-item${cls}" data-id="${c.id}">
      <div class="civ-swatch" style="background:${c.color}"></div>
      <div class="civ-info">
        <div class="civ-name">${c.name}</div>
        <div class="civ-year">${fmtYear(c.start)}</div>
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.civ-item').forEach(el=>{
    el.addEventListener('click',()=> toggleCiv(el.dataset.id));
  });
}

// ═══════════════════════════════════════════════════════════
//  YEAR AXIS
// ═══════════════════════════════════════════════════════════
const axisSvgEl = document.getElementById('axis-svg');
const axisSvg   = d3.select('#axis-svg');
let axisW = 0;

function renderAxis(){
  axisSvg.selectAll('*').remove();
  axisW = axisSvgEl.getBoundingClientRect().width || window.innerWidth;
  const h   = axisSvgEl.getBoundingClientRect().height || 36;
  const cx  = axisW / 2;
  const ppy = axisW / AXIS_WIN; // px per year

  const lo = year - AXIS_WIN/2, hi = year + AXIS_WIN/2;

  // baseline
  axisSvg.append('line')
    .attr('x1',0).attr('y1',h).attr('x2',axisW).attr('y2',h)
    .attr('stroke','#162540').attr('stroke-width',1);

  // ticks
  const minor=10, major=100;
  const start = Math.ceil(lo/minor)*minor;
  for(let y2=start; y2<=hi; y2+=minor){
    const x = cx + (y2 - year)*ppy;
    const isMaj = y2 % major === 0;
    axisSvg.append('line')
      .attr('x1',x).attr('y1',h - (isMaj?16:7))
      .attr('x2',x).attr('y2',h)
      .attr('stroke', isMaj?'#3a608a':'#1e3454')
      .attr('stroke-width', isMaj?1.4:0.7);
    if(isMaj){
      axisSvg.append('text')
        .attr('x',x).attr('y',h-20)
        .attr('text-anchor','middle')
        .attr('fill','#2a4a6a').attr('font-size','9px')
        .text(fmtYear(y2));
    }
  }

  // current year marker
  axisSvg.append('line')
    .attr('x1',cx).attr('y1',0)
    .attr('x2',cx).attr('y2',h)
    .attr('stroke','#f0c060').attr('stroke-width',2).attr('opacity',0.7);
}

// ── drag ──
let dragging=false, dragX0=0, dragY0=0;
const topBar = document.getElementById('top-bar');

function startDrag(clientX){
  dragging = true; dragX0 = clientX; dragY0 = year;
  topBar.classList.add('dragging');
}
function doDrag(clientX){
  if(!dragging) return;
  const ppy = (axisW||window.innerWidth) / AXIS_WIN;
  const dy  = -Math.round((clientX - dragX0) / ppy);
  setYear(clamp(dragY0 + dy, MIN_Y, MAX_Y));
}
function endDrag(){ dragging=false; topBar.classList.remove('dragging'); }

topBar.addEventListener('mousedown', e=>{ startDrag(e.clientX); e.preventDefault(); });
document.addEventListener('mousemove', e=>{ if(dragging) doDrag(e.clientX); });
document.addEventListener('mouseup', endDrag);

topBar.addEventListener('touchstart', e=>{ startDrag(e.touches[0].clientX); e.preventDefault(); },{passive:false});
document.addEventListener('touchmove', e=>{ if(dragging) doDrag(e.touches[0].clientX); },{passive:false});
document.addEventListener('touchend', endDrag);

// keyboard
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='ArrowRight') setYear(clamp(year+(e.shiftKey?100:10), MIN_Y, MAX_Y));
  else if(e.key==='ArrowLeft')  setYear(clamp(year-(e.shiftKey?100:10), MIN_Y, MAX_Y));
  else if(e.key===' '){ togglePlay(); e.preventDefault(); }
});

// ═══════════════════════════════════════════════════════════
//  EVENTS PANEL
// ═══════════════════════════════════════════════════════════
const evSvgEl = document.getElementById('events-svg');
const evSvg   = d3.select('#events-svg');
const evPopup = document.getElementById('ev-popup');

function renderEvents(){
  evSvg.selectAll('*').remove();
  const W   = evSvgEl.getBoundingClientRect().width  || 800;
  const H   = evSvgEl.getBoundingClientRect().height || 160;
  const cx  = W/2, cy = H/2;
  const ppy = W / (EV_WIN*2); // px per year

  // bg
  evSvg.append('rect').attr('width',W).attr('height',H).attr('fill','#060d18');

  // axis line
  evSvg.append('line')
    .attr('x1',0).attr('y1',cy).attr('x2',W).attr('y2',cy)
    .attr('stroke','#162540').attr('stroke-width',1);

  // year labels on axis
  const tickInterval = 50;
  const lo = year-EV_WIN, hi = year+EV_WIN;
  const ts  = Math.ceil(lo/tickInterval)*tickInterval;
  for(let t=ts; t<=hi; t+=tickInterval){
    const x = cx+(t-year)*ppy;
    evSvg.append('line')
      .attr('x1',x).attr('y1',cy-4).attr('x2',x).attr('y2',cy+4)
      .attr('stroke','#162540').attr('stroke-width',0.8);
    evSvg.append('text')
      .attr('x',x).attr('y',cy+14).attr('text-anchor','middle')
      .attr('fill','#1e3050').attr('font-size','8px')
      .text(fmtYear(t));
  }

  // current year line
  evSvg.append('line')
    .attr('x1',cx).attr('y1',0).attr('x2',cx).attr('y2',H)
    .attr('stroke','#f0c060').attr('stroke-width',1.5)
    .attr('stroke-dasharray','5,4').attr('opacity',0.5);

  // filter events
  const vis = EVENTS.filter(e=>{
    if(Math.abs(e.yr - year) > EV_WIN) return false;
    if(!activeCats.has(e.cat)) return false;
    if(searchQ){
      const q=searchQ.toLowerCase();
      return e.title.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q);
    }
    return true;
  });

  vis.forEach((e, i)=>{
    const x    = cx + (e.yr - year)*ppy;
    const above= i%2===0;
    const col  = CAT_COLOR[e.cat]||'#888';
    const stemY= above ? cy-12 : cy+12;
    const lblY = above ? cy-22 : cy+28;

    evSvg.append('line')
      .attr('x1',x).attr('y1',cy).attr('x2',x).attr('y2',stemY)
      .attr('stroke',col).attr('stroke-width',1).attr('opacity',0.55);

    const dot = evSvg.append('circle')
      .attr('cx',x).attr('cy',cy).attr('r',5)
      .attr('fill',col).attr('stroke','#060d18').attr('stroke-width',1.5)
      .style('cursor','pointer');

    const lbl = e.title.length>22 ? e.title.slice(0,20)+'…' : e.title;
    evSvg.append('text')
      .attr('x',x).attr('y',lblY)
      .attr('text-anchor','middle')
      .attr('fill','#6080a0').attr('font-size','8.5px')
      .text(lbl);

    dot.on('click', function(ev){ showEvPopup(ev, e); });
  });
}

function showEvPopup(ev, e){
  const col = CAT_COLOR[e.cat]||'#888';
  document.getElementById('ep-cat').textContent   = e.cat;
  document.getElementById('ep-cat').style.background = col+'33';
  document.getElementById('ep-cat').style.color      = col;
  document.getElementById('ep-title').textContent = e.title;
  document.getElementById('ep-year').textContent  = fmtYear(e.yr);
  document.getElementById('ep-desc').textContent  = e.desc;
  evPopup.style.display='block';
  let x=ev.clientX+14, y=ev.clientY-100;
  if(x+320>window.innerWidth)  x=ev.clientX-325;
  if(y<4) y=4;
  if(y+200>window.innerHeight) y=window.innerHeight-205;
  evPopup.style.left=x+'px';
  evPopup.style.top =y+'px';
}

document.getElementById('ev-popup-close').addEventListener('click',()=>{
  evPopup.style.display='none';
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') evPopup.style.display='none';
});

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════

// play / pause
const playBtn = document.getElementById('play-btn');
function togglePlay(){
  playing = !playing;
  playBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
  playing ? startPlay() : stopPlay();
}
playBtn.addEventListener('click', togglePlay);

function startPlay(){
  stopPlay();
  const msPerTick = 120;
  const yearsPerTick = speed;
  playTimer = setInterval(()=>{
    if(year >= MAX_Y){ togglePlay(); return; }
    setYear(Math.min(year+yearsPerTick, MAX_Y));
  }, msPerTick);
}
function stopPlay(){
  if(playTimer){ clearInterval(playTimer); playTimer=null; }
}

// speed buttons
document.querySelectorAll('[data-spd]').forEach(btn=>{
  btn.addEventListener('click', function(){
    speed = +this.dataset.spd;
    document.querySelectorAll('[data-spd]').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');
    if(playing){ stopPlay(); startPlay(); }
  });
});

// category filter
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click', function(){
    const c=this.dataset.cat;
    if(activeCats.has(c)){ activeCats.delete(c); this.classList.remove('on'); }
    else { activeCats.add(c); this.classList.add('on'); }
    renderEvents();
  });
});

// search
document.getElementById('search-input').addEventListener('input', function(){
  searchQ = this.value.trim();
  renderEvents();
});

// ═══════════════════════════════════════════════════════════
//  MASTER UPDATE
// ═══════════════════════════════════════════════════════════
function setYear(y){
  year = Math.round(y);
  document.getElementById('year-display').textContent = fmtYear(year);
  renderAxis();
  renderCivs();
  renderSidebar();
  renderEvents();
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
function init(){
  initMap();
  setYear(1500);
}
window.addEventListener('load', init);

// responsive resize
let rszTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(rszTimer);
  rszTimer = setTimeout(()=>{
    initMap();
    setYear(year);
  }, 180);
});
</script>
</body>
</html>
